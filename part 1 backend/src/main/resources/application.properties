spring.application.name=Quiz Tournament API
server.port=${PORT:8081}

# ── Database ──────────────────────────────────────────────────────────────────
# Railway injects DATABASE_URL automatically when you add a Postgres plugin.
# Locally it falls back to in-memory HSQLDB so nothing changes for development.
spring.datasource.url=${DATABASE_URL:jdbc:hsqldb:mem:testdb}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# Driver & dialect — auto-detected from the URL at runtime
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000

# ── CORS (allow the deployed frontend to call this API) ───────────────────────
spring.web.cors.allowed-origins=*
