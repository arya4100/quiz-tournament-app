spring.application.name=Quiz Tournament API
server.port=${PORT:8081}

# ── Database ──────────────────────────────────────────────────────────────────
# Railway sets SPRING_DATASOURCE_URL/USERNAME/PASSWORD via its Postgres plugin.
# Locally falls back to in-memory HSQLDB so nothing changes for development.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:hsqldb:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Explicit driver and dialect — prevents Hibernate startup failure on Railway
spring.datasource.driver-class-name=${DB_DRIVER:org.hsqldb.jdbc.JDBCDriver}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.HSQLDialect}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000

# ── CORS (allow the deployed frontend to call this API) ───────────────────────
spring.web.cors.allowed-origins=*
