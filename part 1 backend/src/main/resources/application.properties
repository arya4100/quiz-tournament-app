spring.application.name=Quiz Tournament API
server.port=${PORT:8081}

# ── Database ──────────────────────────────────────────────────────────────────
# Railway injects DATABASE_URL as a full jdbc:postgresql:// URL.
# Locally falls back to in-memory HSQLDB.
spring.datasource.url=${DATABASE_URL:jdbc:hsqldb:mem:testdb}
spring.datasource.username=${PGUSER:sa}
spring.datasource.password=${PGPASSWORD:}

# Explicit driver so Spring Boot doesn't fail to auto-detect on Railway
spring.datasource.driver-class-name=${DB_DRIVER:org.hsqldb.jdbc.JDBCDriver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000

# ── CORS (allow the deployed frontend to call this API) ───────────────────────
spring.web.cors.allowed-origins=*
